<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synapse — Customer Intelligence Platform</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-mark">S</div>
        <span class="logo-text font-syne">Synapse</span>
      </div>
      <p class="login-subtitle">Customer Intelligence Platform</p>
      <form id="login-form" autocomplete="off">
        <label class="login-label" for="login-email">Email</label>
        <input class="input" id="login-email" type="email" placeholder="you@company.com" required>
        <label class="login-label" for="login-password">Password</label>
        <input class="input" id="login-password" type="password" placeholder="Enter password" required>
        <div id="login-error" class="login-error"></div>
        <button type="submit" class="btn btn-primary login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">S</div>
      <span class="logo-text">Synapse</span>
    </div>

    <!-- Home (no children) -->
    <div class="nav-group" data-category="home">
      <div class="nav-group-header" data-page="dashboard">
        <span class="nav-icon">◈</span> Home
      </div>
    </div>

    <!-- Intelligence (single hub page) -->
    <div class="nav-group" data-category="intelligence">
      <div class="nav-group-header" data-page="intel-hub">
        <span class="nav-icon">◉</span> Intelligence
      </div>
    </div>

    <!-- QA -->
    <div class="nav-group" data-category="qa">
      <div class="nav-group-header">
        <span class="nav-icon">▣</span> QA
        <span class="nav-chevron">›</span>
      </div>
      <div class="nav-children">
        <div class="nav-child" data-page="qa-summary">Summary</div>
        <div class="nav-child" data-page="churn-risk">Churn Risk <span class="nav-badge">7</span></div>
      </div>
    </div>

    <!-- Mastermind -->
    <div class="nav-group" data-category="mastermind">
      <div class="nav-group-header">
        <span class="nav-icon">◌</span> Mastermind
        <span class="nav-chevron">›</span>
      </div>
      <div class="nav-children">
        <div class="nav-child" data-page="mastermind-search">Search</div>
        <div class="nav-child" data-page="mastermind-chat">Chat</div>
        <div class="nav-child" data-page="mastermind-articles">Articles</div>
        <div class="nav-child" data-page="mastermind-agents">Agents</div>
      </div>
    </div>

    <!-- Operations -->
    <div class="nav-group" data-category="operations">
      <div class="nav-group-header">
        <span class="nav-icon">⟳</span> Operations
        <span class="nav-chevron">›</span>
      </div>
      <div class="nav-children">
        <div class="nav-child" data-page="ar-dashboard">Auto-Responder</div>
        <div class="nav-child" data-page="ar-drafts">Draft Queue <span class="nav-badge green">5</span></div>
        <div class="nav-child" data-page="ar-config">Configuration</div>
        <div class="nav-child" data-page="mastermind-settings">Pipeline Settings</div>
        <div class="nav-child" data-page="sync">Data Sync</div>
        <div class="nav-child" data-page="documents">Documents</div>
        <div class="nav-child" data-page="stats-freshdesk">Freshdesk</div>
        <div class="nav-child" data-page="stats-jira">Jira</div>
        <div class="nav-child" data-page="stats-attachments">Attachments</div>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main id="main">
    <div class="topbar">
      <button class="back-btn" id="back-btn" style="display:none">←</button>
      <div class="breadcrumb" id="breadcrumb">
        <span class="breadcrumb-current">Home</span>
      </div>
      <span id="topbar-action"></span>
    </div>
    <div id="page-container"></div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/router.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/sync.js"></script>
  <script src="js/pages/documents.js"></script>
  <script src="js/pages/intelligence.js"></script>
  <script src="js/pages/qa.js"></script>
  <script src="js/pages/mastermind.js"></script>
  <script src="js/pages/autoresponder.js"></script>
  <script src="js/pages/analytics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
